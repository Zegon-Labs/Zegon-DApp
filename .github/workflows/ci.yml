name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build game-core
        run: pnpm --filter @zegon/game-core build

      - name: Compile contracts
        run: pnpm compile

      - name: Test game-core and game-server
        run: pnpm test

      - name: Test contracts
        run: pnpm test:contracts

      - name: Production build (Vercel)
        run: pnpm vercel-build
