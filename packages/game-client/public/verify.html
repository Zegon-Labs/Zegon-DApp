<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEGON — Verificar en cadena</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />
    <style>
      :root {
        --void: #0a0911;
        --ash: #14121c;
        --bone: #e6e1d3;
        --dust: #9a93a8;
        --cyan: #2ee6d6;
        --ember: #ff4d2e;
        --blood: #b3122b;
        --verified: #4df07a;
        --fog: #2a2638;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: var(--void);
        color: var(--bone);
        font-family: "VT323", monospace;
        font-size: 20px;
        min-height: 100vh;
        padding: 24px 16px 48px;
      }
      .wrap { max-width: 720px; margin: 0 auto; }
      h1 { font-size: 42px; color: var(--cyan); margin-bottom: 4px; }
      .tagline { color: var(--dust); margin-bottom: 24px; font-size: 22px; }
      .status {
        padding: 12px 16px;
        border: 1px solid var(--fog);
        background: var(--ash);
        margin-bottom: 20px;
        font-size: 24px;
      }
      .status.ok { color: var(--verified); border-color: var(--verified); }
      .status.pending { color: var(--ember); }
      .btn {
        display: inline-block;
        padding: 10px 20px;
        border: 2px solid var(--blood);
        color: var(--blood);
        text-decoration: none;
        font-size: 24px;
        margin: 8px 8px 8px 0;
        background: transparent;
        cursor: pointer;
        font-family: inherit;
      }
      .btn:hover { background: rgba(179, 18, 43, 0.12); color: var(--ember); border-color: var(--ember); }
      .btn.primary { background: rgba(179, 18, 43, 0.15); }
      .meta { color: var(--dust); font-size: 18px; word-break: break-all; margin: 12px 0; }
      .duel-id-box {
        border: 1px solid var(--fog);
        background: rgba(10, 9, 17, 0.65);
        padding: 10px 12px;
        margin: 12px 0 8px;
      }
      .duel-id-box__label {
        font-size: 14px;
        color: var(--dust);
        margin-bottom: 4px;
      }
      .duel-id-box__value {
        font-size: 22px;
        color: var(--cyan);
        letter-spacing: 0.06em;
        word-break: break-all;
      }
      .duel-id-box__hint {
        margin-top: 6px;
        font-size: 16px;
        color: var(--dust);
        line-height: 1.35;
      }
      .duel-id-box__copy {
        margin-top: 8px;
        padding: 4px 10px;
        border: 1px solid var(--fog);
        background: transparent;
        color: var(--bone);
        font-family: inherit;
        font-size: 16px;
        cursor: pointer;
      }
      .duel-id-box__copy:hover { border-color: var(--blood); color: var(--ember); }
      .round {
        border: 1px solid var(--fog);
        background: var(--ash);
        padding: 14px 16px;
        margin-bottom: 12px;
      }
      .round h3 { color: var(--ember); font-size: 26px; margin-bottom: 8px; }
      .round .proof { color: var(--verified); font-size: 18px; }
      .round a { color: var(--blood); word-break: break-all; }
      .round a:hover { color: var(--ember); }
      .round .links { margin-top: 8px; line-height: 1.6; }
      .timeline-v {
        margin: 14px 0 10px;
        position: relative;
        padding-left: 4px;
      }
      .timeline-v::before {
        content: "";
        position: absolute;
        left: 11px;
        top: 14px;
        bottom: 14px;
        width: 2px;
        background: linear-gradient(180deg, var(--cyan), var(--fog) 40%, var(--ember));
      }
      .timeline-step {
        position: relative;
        margin-bottom: 4px;
        padding: 8px 12px 10px 28px;
        background: rgba(10, 9, 17, 0.55);
        border: 1px solid var(--fog);
      }
      .timeline-step::before {
        content: "";
        position: absolute;
        left: 6px;
        top: 14px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        box-shadow: 0 0 0 2px var(--ash);
      }
      .timeline-step--zegon::before { background: var(--cyan); }
      .timeline-step--player::before { background: var(--ember); }
      .timeline-step--first { border-color: rgba(77, 240, 122, 0.45); }
      .timeline-who {
        font-size: 15px;
        color: var(--dust);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 4px;
      }
      .timeline-move {
        font-size: 24px;
        line-height: 1.25;
        margin-bottom: 4px;
      }
      .timeline-move strong { color: var(--bone); }
      .timeline-step--zegon .timeline-move strong { color: var(--cyan); }
      .timeline-step--player .timeline-move strong { color: var(--ember); }
      .timeline-ts {
        font-size: 16px;
        color: var(--dust);
        font-variant-numeric: tabular-nums;
      }
      .timeline-gap {
        padding: 6px 0 6px 28px;
        font-size: 16px;
        color: var(--dust);
      }
      .timeline-gap span {
        display: inline-block;
        padding: 2px 8px;
        border: 1px dashed var(--fog);
        background: rgba(10, 9, 17, 0.4);
      }
      .timeline-hint {
        margin-bottom: 10px;
        line-height: 1.35;
      }
      .loading { color: var(--dust); font-size: 24px; }
      .error { color: var(--ember); }
      code { color: var(--dust); font-size: 16px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1 id="title">ZEGON — VERIFY</h1>
      <p class="tagline" id="subtitle">Prueba on-chain · Galileo testnet</p>
      <div id="content"><p class="loading" id="loading">Cargando prueba…</p></div>
    </div>
    <script>
      const EXPLORER = "https://chainscan-galileo.0g.ai";
      const LOCALE = localStorage.getItem("zegon-language") === "en" ? "en" : "es";

      const T = {
        es: {
          title: "ZEGON — VERIFICAR",
          subtitle: "Prueba on-chain · Galileo testnet",
          loading: "Cargando prueba…",
          error: "No se pudo cargar la prueba.",
          noDuel: "Falta el ID del duelo.",
          noDuelHelp: "Esta página muestra la prueba de un duelo concreto. Si querés entender cómo funciona VERIFY, leé la guía.",
          openGuide: "Cómo funciona VERIFY",
          verified: "✓ PRUEBA VERIFICADA — commit antes de cada jugada",
          pending: "Prueba incompleta",
          openContract: "Abrir contrato en Chainscan",
          openRecord: "Ver registro final del duelo",
          duelId: "ID del duelo",
          duelIdHint: "Código corto de esta partida (32 caracteres). No es la prueba en sí: la prueba está en cada ronda de abajo.",
          duelIdCopy: "Copiar ID",
          duelIdCopied: "Copiado",
          duelIdBadParam: "El enlace parece incorrecto (token en lugar de ID). Abrí VERIFY desde el botón al final de la partida.",
          contract: "Contrato",
          round: "Ronda",
          zegonMove: "Movimiento de ZEGON",
          playerMove: "Tu jugada",
          predictedMove: "ZEGON predijo",
          timelineZegon: "1. ZEGON selló en cadena",
          timelineYou: "2. Tú jugaste",
          timelinePredicted: "Predijo",
          timelinePlayed: "Movimiento",
          timelineHint: "Orden real: ZEGON compromete su jugada en blockchain; después envías la tuya. Los timestamps lo demuestran.",
          timelineNoTs: "Sin marca de tiempo",
          timelineDelta: "después",
          predictionHit: "Predicción acertada",
          predictionMiss: "Predicción fallida",
          commitBefore: "Commit on-chain antes de tu input",
          yes: "Sí",
          no: "No",
          commitTx: "Tx commit (sellado)",
          revealTx: "Tx reveal (revelado)",
          actions: {
            FIRE: "Disparar",
            DODGE: "Esquivar",
            USE_ITEM: "Usar objeto",
            FIRE_HIGH: "Disparo alto",
            FIRE_LOW: "Disparo bajo",
            DODGE: "Esquivar",
            FEINT: "Finta",
            RELOAD: "Recargar",
          },
        },
        en: {
          title: "ZEGON — VERIFY",
          subtitle: "On-chain proof · Galileo testnet",
          loading: "Loading proof…",
          error: "Could not load proof.",
          noDuel: "Missing duel ID.",
          noDuelHelp: "This page shows proof for a specific duel. To learn how VERIFY works, read the guide.",
          openGuide: "How VERIFY works",
          verified: "✓ PROOF VERIFIED — commit before every input",
          pending: "Proof incomplete",
          openContract: "Open contract on Chainscan",
          openRecord: "View final duel record tx",
          duelId: "Duel ID",
          duelIdHint: "Short code for this match (32 characters). This is not the proof itself — the proof is in each round below.",
          duelIdCopy: "Copy ID",
          duelIdCopied: "Copied",
          duelIdBadParam: "This link looks wrong (token instead of ID). Open VERIFY from the end-of-match button.",
          contract: "Contract",
          round: "Round",
          zegonMove: "ZEGON move",
          playerMove: "Your move",
          predictedMove: "ZEGON predicted",
          timelineZegon: "1. ZEGON sealed on-chain",
          timelineYou: "2. You played",
          timelinePredicted: "Predicted",
          timelinePlayed: "Move",
          timelineHint: "Actual order: ZEGON commits on-chain first; then you send your move. Timestamps prove it.",
          timelineNoTs: "No timestamp",
          timelineDelta: "later",
          predictionHit: "Prediction correct",
          predictionMiss: "Prediction missed",
          commitBefore: "On-chain commit before your input",
          yes: "Yes",
          no: "No",
          commitTx: "Commit tx (sealed)",
          revealTx: "Reveal tx (opened)",
          actions: {
            FIRE: "Shoot",
            DODGE: "Dodge",
            USE_ITEM: "Use item",
            FIRE_HIGH: "Fire high",
            FIRE_LOW: "Fire low",
            DODGE: "Dodge",
            FEINT: "Feint",
            RELOAD: "Reload",
          },
        },
      }[LOCALE];

      document.getElementById("title").textContent = T.title;
      document.getElementById("subtitle").textContent = T.subtitle;
      document.documentElement.lang = LOCALE;

      function txUrl(hash) {
        return hash ? `${EXPLORER}/tx/${hash}` : null;
      }

      function moveLabel(key) {
        return T.actions[key] || key || "—";
      }

      function playerMoveLabel(r) {
        const base = moveLabel(r.playerAction);
        if (r.playerAction === "USE_ITEM" && r.itemUsed) {
          const items = {
            SMOKE: LOCALE === "es" ? "Humo" : "Smoke",
            MIRROR: LOCALE === "es" ? "Espejo" : "Mirror",
            PLATE: LOCALE === "es" ? "Placa" : "Plate",
          };
          return `${base} (${items[r.itemUsed] || r.itemUsed})`;
        }
        return base || "—";
      }

      function decodeBase64Url(value) {
        const pad = value.length % 4 === 0 ? "" : "=".repeat(4 - (value.length % 4));
        return atob(value.replace(/-/g, "+").replace(/_/g, "/") + pad);
      }

      function resolveDuelId(raw) {
        if (!raw) return { id: null, badParam: false };
        if (/^[a-f0-9]{32}$/i.test(raw)) return { id: raw, badParam: false };
        try {
          const parsed = JSON.parse(decodeBase64Url(raw));
          if (parsed && typeof parsed.id === "string" && /^[a-f0-9]{32}$/i.test(parsed.id)) {
            return { id: parsed.id, badParam: true };
          }
        } catch {
          /* ignore */
        }
        if (raw.length > 40) return { id: raw, badParam: true };
        return { id: raw, badParam: false };
      }

      function formatDuelId(id) {
        if (!id) return "—";
        if (id.length <= 24) return id;
        return `${id.slice(0, 8)}…${id.slice(-8)}`;
      }

      function formatTs(ms) {
        if (!ms) return T.timelineNoTs;
        try {
          return new Date(ms).toLocaleString(LOCALE === "es" ? "es-ES" : "en-US", {
            day: "2-digit",
            month: "short",
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            fractionalSecondDigits: 3,
          });
        } catch {
          return new Date(ms).toISOString();
        }
      }

      function formatDelta(ms) {
        if (!ms || ms <= 0) return "";
        if (ms < 1000) {
          const n = Math.round(ms);
          return LOCALE === "es" ? `${n} ms ${T.timelineDelta}` : `${n} ms ${T.timelineDelta}`;
        }
        const s = (ms / 1000).toFixed(2);
        return LOCALE === "es" ? `${s} s ${T.timelineDelta}` : `${s}s ${T.timelineDelta}`;
      }

      function renderTimeline(r) {
        const zTs = r.commitTsOnChain ? r.commitTsOnChain * 1000 : r.commitTimestamp || 0;
        const pTs = r.playerActionTimestamp || 0;
        const delta = zTs && pTs ? pTs - zTs : 0;
        const zegonFirst = r.commitBeforePlayer !== false;
        const predicted = moveLabel(r.predictedMove);
        const zegon = moveLabel(r.zegonMove);
        const player = playerMoveLabel(r);

        return `
          <div class="timeline-v">
            <div class="timeline-step timeline-step--zegon ${zegonFirst ? "timeline-step--first" : ""}">
              <div class="timeline-who">${T.timelineZegon}</div>
              <div class="timeline-move">${T.timelinePredicted}: <strong>${predicted}</strong> · ${T.timelinePlayed}: <strong>${zegon}</strong></div>
              <div class="timeline-ts">${formatTs(zTs)}</div>
            </div>
            ${delta > 0 ? `<div class="timeline-gap"><span>↓ ${formatDelta(delta)}</span></div>` : ""}
            <div class="timeline-step timeline-step--player ${!zegonFirst ? "timeline-step--first" : ""}">
              <div class="timeline-who">${T.timelineYou}</div>
              <div class="timeline-move">${T.playerMove}: <strong>${player}</strong></div>
              <div class="timeline-ts">${formatTs(pTs)}</div>
            </div>
          </div>
          <p class="meta timeline-hint">${T.timelineHint}</p>`;
      }

      function duelIdBlock(id, badParam) {
        const safeId = id ?? "—";
        return `
          <div class="duel-id-box">
            <div class="duel-id-box__label">${T.duelId}</div>
            <div class="duel-id-box__value" title="${safeId}">${formatDuelId(safeId)}</div>
            <p class="duel-id-box__hint">${badParam ? T.duelIdBadParam : T.duelIdHint}</p>
            <button type="button" class="duel-id-box__copy" data-copy-id="${safeId}">${T.duelIdCopy}</button>
          </div>`;
      }

      async function renderAuditFromRoot(root) {
        const content = document.getElementById("content");
        content.innerHTML = `<p class="meta">${T.loading}</p>`;
        let payload = null;
        try {
          const direct = await fetch(`https://indexer-storage-turbo.0g.ai/download?root=${encodeURIComponent(root)}`);
          if (direct.ok) payload = await direct.json();
        } catch { /* */ }
        if (!payload) {
          const proxy = await fetch(`/api/audit/storage?root=${encodeURIComponent(root)}`);
          if (proxy.ok) {
            const data = await proxy.json();
            payload = data.payload;
          }
        }
        if (!payload || !Array.isArray(payload.logs)) {
          content.innerHTML = `<p class="error">${T.loadFailed ?? "Could not load log."}</p>`;
          return;
        }
        let html = `<div class="duel-id-box"><div class="duel-id-box__label">Storage root</div><div class="duel-id-box__value">${root}</div></div>`;
        payload.logs.forEach((log, i) => {
          const round = (log.roundIndex ?? i) + 1;
          html += `<section class="round"><h3>Round ${round}</h3><pre class="meta">${JSON.stringify(log, null, 2)}</pre></section>`;
        });
        content.innerHTML = html;
      }

      async function main() {
        const params = new URLSearchParams(location.search);
        const root = params.get("root");
        if (root) {
          await renderAuditFromRoot(root);
          return;
        }
        const rawDuelId = params.get("duel");
        const { id: duelId, badParam } = resolveDuelId(rawDuelId);
        const content = document.getElementById("content");

        if (!duelId) {
          content.innerHTML = `
            <p class="error">${T.noDuel}</p>
            <p class="meta" style="margin-top: 16px;">${T.noDuelHelp}</p>
            <a class="btn primary" href="/verify-guide.html">${T.openGuide}</a>
            <a class="btn" href="/" style="margin-left: 8px;">←</a>`;
          return;
        }

        try {
          const tokenKey = "zegon-duel-token:" + duelId;
          const sessionToken =
            sessionStorage.getItem(tokenKey) ||
            (sessionStorage.getItem("zegon-last-duel-id") === duelId
              ? sessionStorage.getItem("zegon-last-duel-token")
              : null);
          const verifyUrl = sessionToken
            ? `/api/duel/verify/${encodeURIComponent(duelId)}?token=${encodeURIComponent(sessionToken)}`
            : `/api/duel/verify/${encodeURIComponent(duelId)}`;
          const res = await fetch(verifyUrl);
          if (!res.ok) throw new Error(String(res.status));
          const data = await res.json();

          const localLogs = (() => {
            try {
              const raw = sessionStorage.getItem("zegon-duel-rounds:" + duelId);
              if (!raw) return null;
              const parsed = JSON.parse(raw);
              return Array.isArray(parsed) ? parsed : null;
            } catch {
              return null;
            }
          })();
          const localByIndex = new Map(
            (localLogs ?? []).map((r) => [Number(r.roundIndex), r]),
          );
          const rounds = data.rounds.map((r) => {
            const local = localByIndex.get(r.roundIndex);
            if (!local) return r;
            return {
              ...r,
              playerAction: r.playerAction || local.playerAction,
              itemUsed: r.itemUsed || local.itemUsed,
              predictedMove: r.predictedMove || local.predictedMove,
              zegonMove: r.zegonMove || local.zegonMove,
              commitTimestamp: r.commitTimestamp || local.commitTimestamp,
              playerActionTimestamp: r.playerActionTimestamp || local.playerActionTimestamp,
              predictionCorrect:
                r.predictionCorrect != null
                  ? r.predictionCorrect
                  : local.predictionCorrect,
            };
          });

          const proofCount = rounds.filter((r) => r.commitBeforePlayer).length;
          const allOk = data.verified && proofCount === rounds.length;

          let html = `
            <div class="status ${allOk ? "ok" : "pending"}">
              ${allOk ? T.verified : T.pending}
              (${proofCount}/${rounds.length})
            </div>
            <a class="btn primary" href="${EXPLORER}/address/${data.contractAddress}" target="_blank" rel="noopener">
              ${T.openContract}
            </a>`;

          if (data.recordTxHash) {
            html += `
            <a class="btn" href="${txUrl(data.recordTxHash)}" target="_blank" rel="noopener">
              ${T.openRecord}
            </a>`;
          }

          html += duelIdBlock(data.duelId, badParam);
          html += `
            <p class="meta"><strong>${T.contract}:</strong> <code>${data.contractAddress}</code></p>`;

          if (data.teeVerified) {
            html += `<p class="meta" style="color: var(--verified);"><strong>0G TEE:</strong> ✓ Attestation present</p>`;
          }
          if (data.storageUrl) {
            html += `<p class="meta"><a href="${data.storageUrl}" target="_blank" rel="noopener">0G Storage log ↗</a></p>`;
          }

          for (const r of rounds) {
            html += `
              <div class="round" data-round="${r.roundIndex}">
                <h3>${T.round} ${r.roundIndex + 1}</h3>
                ${renderTimeline(r)}
                ${r.predictionCorrect != null ? `<p class="meta" style="color: ${r.predictionCorrect ? "var(--verified)" : "var(--dust)"};">${r.predictionCorrect ? T.predictionHit : T.predictionMiss}</p>` : ""}
                <p class="proof">${T.commitBefore}: <strong>${r.commitBeforePlayer ? T.yes : T.no}</strong></p>
                ${r.attestationHash ? `<p class="meta"><strong>TEE attestation:</strong> <code>${r.attestationHash.slice(0, 16)}…</code></p>` : ""}
                <div class="links">
                  ${r.commitTxHash ? `<div><a href="${txUrl(r.commitTxHash)}" target="_blank" rel="noopener">${T.commitTx} →</a></div>` : ""}
                  ${r.revealTxHash ? `<div><a href="${txUrl(r.revealTxHash)}" target="_blank" rel="noopener">${T.revealTx} →</a></div>` : ""}
                </div>
              </div>`;
          }

          content.innerHTML = html;

          content.querySelectorAll("[data-copy-id]").forEach((btn) => {
            btn.addEventListener("click", async () => {
              const value = btn.getAttribute("data-copy-id") ?? "";
              try {
                await navigator.clipboard.writeText(value);
                btn.textContent = T.duelIdCopied;
              } catch {
                /* ignore */
              }
            });
          });
        } catch {
          content.innerHTML = `<p class="error">${T.error}</p>`;
        }
      }

      main();
    </script>
  </body>
</html>
