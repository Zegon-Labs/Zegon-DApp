    <audio

      playsinline
      preload="auto"

      style="display: none"
    ></audio>
    <div id="root"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var track = document.getElementById("zegon-bgm");
        if (!track) return;
        track.volume = 0.56;
        var play = function () {
          track.play().catch(function () {});
        };
        play();
        track.addEventListener("canplaythrough", play, { once: true });
      });
    </script>
