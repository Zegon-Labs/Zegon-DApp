<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZEGON — It can't see you. It reads you.</title>
    <meta name="description" content="ZEGON: duelo de pistoleros contra una IA ciega que te lee por tus patrones. Provably fair on-chain con 0G." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <audio
      id="zegon-bgm"
      autoplay
      loop
      playsinline
      preload="auto"
      src="/audio/ghosts-in-spur-dust.mp3"
      style="display: none"
    ></audio>
    <div id="root"></div>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var track = document.getElementById("zegon-bgm");
        if (!track) return;
        track.volume = 0.56;
        var play = function () {
          track.play().catch(function () {});
        };
        play();
        track.addEventListener("canplaythrough", play, { once: true });
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
