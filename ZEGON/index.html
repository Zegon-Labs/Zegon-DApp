<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEGON — It can't see you. It reads you.</title>
  <meta name="description" content="ZEGON: duelo de pistoleros contra una IA ciega que te lee por tus patrones. Provably fair on-chain con 0G." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <main class="hero">

    <!-- Capa de fondo: paisaje + luna roja -->
    <div class="hero__bg" aria-hidden="true">
      <img src="assets/bg.png" alt="" class="hero__bg-img" />
    </div>

    <!-- Viñeta / degradado para legibilidad del contenido -->
    <div class="hero__vignette" aria-hidden="true"></div>

    <!-- Capa del personaje -->
    <div class="hero__character" aria-hidden="true">
      <div class="smoke-layer smoke-layer--1" aria-hidden="true"></div>
      <div class="smoke-layer smoke-layer--2" aria-hidden="true"></div>
      <div class="smoke-layer smoke-layer--3" aria-hidden="true"></div>
      <img src="assets/character.png" alt="" class="hero__character-img" />
    </div>

    <!-- Contenido -->
    <div class="hero__content">

      <h1 class="hero__logo">
        <img src="assets/logo.png" alt="ZEGON" class="hero__logo-img" />
      </h1>

      <p class="hero__tagline">It can't see you. It reads you.</p>

      <div class="hero__actions">
        <button id="play-now-btn" type="button" class="btn btn--primary" data-action="play-now">
          <span class="btn__title">Play Now</span>
          <span class="btn__subtitle">Enter the duel</span>
        </button>

        <div class="hero__divider" role="separator">
          <span>or</span>
        </div>

        <button id="connect-wallet-btn" type="button" class="btn btn--secondary" data-action="connect-wallet">
          <svg class="btn__icon" width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v1H3V7Z" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 9h16a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9Z" stroke="currentColor" stroke-width="1.5"/>
            <circle cx="16.5" cy="14" r="1.25" fill="currentColor"/>
          </svg>
          <span>Connect OG Wallet</span>
        </button>
      </div>

      <p class="hero__verify-copy">
        Zegon's inference is sealed.<br />
        Every duel is <span class="text-accent">verified on-chain</span>.
      </p>

      <p class="hero__guest-note">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="5" y="11" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M8 11V7a4 4 0 0 1 8 0v4" stroke="currentColor" stroke-width="1.6"/>
        </svg>
        Wallet optional — play as guest. Connect later for rewards and rankings.
      </p>

    </div>

    <!-- Footer: built on 0G -->
    <footer class="hero__footer">
      <div class="hero__footer-built">
        <span class="hero__footer-line" aria-hidden="true"></span>
        <span class="hero__footer-label">Built on</span>
        <span class="hero__footer-og">0G</span>
        <span class="hero__footer-line" aria-hidden="true"></span>
      </div>

      <div class="hero__footer-features">
        <div class="footer-feature">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
            <path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <p class="footer-feature__title">0G Compute</p>
          <p class="footer-feature__desc">Sealed inference</p>
        </div>
        <div class="footer-feature">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 3 4 7v6c0 4.5 3.4 7.7 8 9 4.6-1.3 8-4.5 8-9V7l-8-4Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
          </svg>
          <p class="footer-feature__title">0G Chain</p>
          <p class="footer-feature__desc">Provably fair</p>
        </div>
        <div class="footer-feature">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <ellipse cx="12" cy="5.5" rx="7.5" ry="2.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4.5 5.5V12c0 1.4 3.4 2.5 7.5 2.5s7.5-1.1 7.5-2.5V5.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M4.5 12v6.5c0 1.4 3.4 2.5 7.5 2.5s7.5-1.1 7.5-2.5V12" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <p class="footer-feature__title">0G Storage</p>
          <p class="footer-feature__desc">Verifiable data</p>
        </div>
      </div>
    </footer>

  </main>

  <script src="js/main.js"></script>
</body>
</html>
